<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Used Car Price Prediction</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <div class="container">

        <h1>🚗 Used Car Price Prediction</h1>

        <p class="subtitle">
            Enter vehicle details to estimate its selling price.
        </p>

        <form action="/predict" method="POST">

            <div class="form-group">
                <label for="year">Manufacturing Year</label>
                <input
                    type="number"
                    id="year"
                    name="year"
                    min="1990"
                    max="2024"
                    value="2018"
                    required>
            </div>

            <div class="form-group">
                <label for="km_driven">Kilometers Driven</label>
                <input
                    type="number"
                    id="km_driven"
                    name="km_driven"
                    min="0"
                    value="30000"
                    required>
            </div>

            <div class="form-group">
                <label for="fuel">Fuel Type</label>

                <select id="fuel" name="fuel">

                    <option value="Petrol">Petrol</option>
                    <option value="Diesel">Diesel</option>
                    <option value="CNG">CNG</option>
                    <option value="LPG">LPG</option>
                    <option value="Electric">Electric</option>

                </select>
            </div>

            <div class="form-group">
                <label for="seller_type">Seller Type</label>

                <select id="seller_type" name="seller_type">

                    <option value="Individual">Individual</option>
                    <option value="Dealer">Dealer</option>
                    <option value="Trustmark Dealer">Trustmark Dealer</option>

                </select>
            </div>

            <div class="form-group">
                <label for="transmission">Transmission</label>

                <select id="transmission" name="transmission">

                    <option value="Manual">Manual</option>
                    <option value="Automatic">Automatic</option>

                </select>
            </div>

            <div class="form-group">
                <label for="owner">Owner Type</label>

                <select id="owner" name="owner">

                    <option value="First Owner">First Owner</option>
                    <option value="Second Owner">Second Owner</option>
                    <option value="Third Owner">Third Owner</option>
                    <option value="Fourth & Above Owner">Fourth & Above Owner</option>
                    <option value="Test Drive Car">Test Drive Car</option>

                </select>
            </div>

            <div class="form-group">
                <label for="brand">Brand</label>

                <input
                    type="text"
                    id="brand"
                    name="brand"
                    placeholder="e.g. Maruti"
                    value="Maruti"
                    required>
            </div>

            <div class="form-group">
                <input
                    type="submit"
                    value="Predict Price"
                    class="btn">
            </div>

        </form>

        {% if prediction_text %}

        <div class="result">

            <h2>{{ prediction_text }}</h2>

        </div>

        {% endif %}

    </div>

</body>

</html>
